<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="580" fill="white"/>

  <defs>
    <marker id="open-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L10 6L1 11" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="nav-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1L10 6L1 11" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Üniversite -->
  <rect x="240" y="30" width="160" height="44" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="1"/>
  <line x1="240" y1="52" x2="400" y2="52" stroke="#555" stroke-width="1"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="bold" x="320" y="46" text-anchor="middle" dominant-baseline="central" fill="#222">Üniversite</text>

  <!-- Sınıflık -->
  <rect x="40" y="200" width="130" height="44" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="1"/>
  <line x1="40" y1="222" x2="170" y2="222" stroke="#555" stroke-width="1"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="bold" x="105" y="216" text-anchor="middle" dominant-baseline="central" fill="#222">Sınıflık</text>

  <!-- Departman -->
  <rect x="240" y="200" width="160" height="44" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="1"/>
  <line x1="240" y1="222" x2="400" y2="222" stroke="#555" stroke-width="1"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="bold" x="320" y="216" text-anchor="middle" dominant-baseline="central" fill="#222">Departman</text>

  <!-- Ofis -->
  <rect x="500" y="200" width="130" height="44" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="1"/>
  <line x1="500" y1="222" x2="630" y2="222" stroke="#555" stroke-width="1"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="bold" x="565" y="216" text-anchor="middle" dominant-baseline="central" fill="#222">Ofis</text>

  <!-- Çalışan -->
  <rect x="240" y="370" width="160" height="52" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="1.5" stroke-dasharray="6 3"/>
  <line x1="240" y1="392" x2="400" y2="392" stroke="#555" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="bold" x="320" y="386" text-anchor="middle" dominant-baseline="central" fill="#222">Çalışan</text>
  <text font-family="Arial, sans-serif" font-size="12" font-style="italic" x="320" y="406" text-anchor="middle" dominant-baseline="central" fill="#555">«abstract»</text>

  <!-- Profesör -->
  <rect x="120" y="500" width="130" height="44" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="1"/>
  <line x1="120" y1="522" x2="250" y2="522" stroke="#555" stroke-width="1"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="bold" x="185" y="516" text-anchor="middle" dominant-baseline="central" fill="#222">Profesör</text>

  <!-- Memur -->
  <rect x="410" y="500" width="130" height="44" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="1"/>
  <line x1="410" y1="522" x2="540" y2="522" stroke="#555" stroke-width="1"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="bold" x="475" y="516" text-anchor="middle" dominant-baseline="central" fill="#222">Memur</text>

  <!-- COMPOSITION: Üniversite -> Sınıflık -->
  <line x1="240" y1="52" x2="105" y2="52" stroke="#555" stroke-width="1"/>
  <line x1="105" y1="52" x2="105" y2="200" stroke="#555" stroke-width="1"/>
  <polygon points="240,52 252,46 264,52 252,58" fill="#555"/>
  <text font-family="Arial, sans-serif" font-size="11" x="228" y="46" text-anchor="end" fill="#555">1</text>
  <text font-family="Arial, sans-serif" font-size="11" x="118" y="196" text-anchor="start" fill="#555">1..*</text>

  <!-- COMPOSITION: Üniversite -> Departman -->
  <line x1="320" y1="74" x2="320" y2="200" stroke="#555" stroke-width="1"/>
  <polygon points="320,74 314,62 320,50 326,62" fill="#555"/>
  <text font-family="Arial, sans-serif" font-size="11" x="332" y="95" text-anchor="start" fill="#555">1</text>
  <text font-family="Arial, sans-serif" font-size="11" x="332" y="195" text-anchor="start" fill="#555">1..*</text>

  <!-- COMPOSITION: Üniversite -> Çalışan -->
  <line x1="400" y1="52" x2="450" y2="52" stroke="#555" stroke-width="1"/>
  <line x1="450" y1="52" x2="450" y2="355" stroke="#555" stroke-width="1"/>
  <line x1="450" y1="355" x2="400" y2="355" stroke="#555" stroke-width="1"/>
  <line x1="400" y1="355" x2="400" y2="370" stroke="#555" stroke-width="1"/>
  <polygon points="400,52 388,46 376,52 388,58" fill="#555"/>
  <text font-family="Arial, sans-serif" font-size="11" x="460" y="68" text-anchor="start" fill="#555">1</text>
  <text font-family="Arial, sans-serif" font-size="11" x="408" y="365" text-anchor="start" fill="#555">1..*</text>

  <!-- COMPOSITION: Departman -> Ofis -->
  <line x1="400" y1="222" x2="500" y2="222" stroke="#555" stroke-width="1"/>
  <polygon points="400,222 412,216 424,222 412,228" fill="#555"/>
  <text font-family="Arial, sans-serif" font-size="11" x="406" y="214" text-anchor="start" fill="#555">1</text>
  <text font-family="Arial, sans-serif" font-size="11" x="494" y="214" text-anchor="end" fill="#555">1..*</text>

  <!-- ASSOCİASYON: Çalışan -> Ofis -->
  <line x1="400" y1="396" x2="565" y2="396" stroke="#555" stroke-width="1"/>
  <line x1="565" y1="396" x2="565" y2="244" stroke="#555" stroke-width="1" marker-end="url(#nav-arrow)"/>
  <text font-family="Arial, sans-serif" font-size="11" x="408" y="390" text-anchor="start" fill="#555">*</text>
  <text font-family="Arial, sans-serif" font-size="11" x="578" y="265" text-anchor="start" fill="#555">1</text>
  <text font-family="Arial, sans-serif" font-size="11" x="480" y="390" text-anchor="middle" fill="#555">çalışır</text>

  <!-- KALITIM: Profesör -> Çalışan -->
  <line x1="185" y1="500" x2="185" y2="455" stroke="#555" stroke-width="1"/>
  <line x1="185" y1="455" x2="320" y2="455" stroke="#555" stroke-width="1"/>
  <line x1="320" y1="455" x2="320" y2="422" stroke="#555" stroke-width="1" marker-end="url(#open-arrow)"/>

  <!-- KALITIM: Memur -> Çalışan -->
  <line x1="475" y1="500" x2="475" y2="455" stroke="#555" stroke-width="1"/>
  <line x1="475" y1="455" x2="320" y2="455" stroke="#555" stroke-width="1"/>
</svg>
