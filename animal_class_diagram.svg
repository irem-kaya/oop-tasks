<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="620" fill="white"/>
  <defs>
    <marker id="open-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1L10 6L1 11" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- HAYVAN (abstract) -->
  <rect x="220" y="20" width="220" height="100" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="1.5" stroke-dasharray="6 3"/>
  <line x1="220" y1="44" x2="440" y2="44" stroke="#555" stroke-width="1.5" stroke-dasharray="6 3"/>
  <line x1="220" y1="68" x2="440" y2="68" stroke="#555" stroke-width="1" stroke-dasharray="4 3"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="bold" x="330" y="36" text-anchor="middle" dominant-baseline="central" fill="#222">Hayvan</text>
  <text font-family="Arial, sans-serif" font-size="12" font-style="italic" x="330" y="56" text-anchor="middle" dominant-baseline="central" fill="#555">«abstract»</text>
  <text font-family="Arial, sans-serif" font-size="11" x="230" y="80" dominant-baseline="central" fill="#444">+ türAdı: String</text>
  <text font-family="Arial, sans-serif" font-size="11" x="230" y="95" dominant-baseline="central" fill="#444">+ ağırlık: double</text>
  <text font-family="Arial, sans-serif" font-size="11" x="230" y="110" dominant-baseline="central" fill="#444">+ yaş: int</text>

  <rect x="220" y="120" width="220" height="52" rx="0" fill="#f5f5f0" stroke="#555" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text font-family="Arial, sans-serif" font-size="11" font-style="italic" x="230" y="138" dominant-baseline="central" fill="#444">+ getDosage(): double</text>
  <text font-family="Arial, sans-serif" font-size="11" font-style="italic" x="230" y="156" dominant-baseline="central" fill="#444">+ getFeedSchedule(): String</text>

  <!-- ATLAR -->
  <rect x="30" y="330" width="170" height="86" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="1"/>
  <line x1="30" y1="352" x2="200" y2="352" stroke="#555" stroke-width="1"/>
  <line x1="30" y1="368" x2="200" y2="368" stroke="#555" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="bold" x="115" y="344" text-anchor="middle" dominant-baseline="central" fill="#222">Atlar</text>
  <text font-family="Arial, sans-serif" font-size="11" x="40" y="380" dominant-baseline="central" fill="#444">+ getDosage()</text>
  <text font-family="Arial, sans-serif" font-size="11" x="40" y="398" dominant-baseline="central" fill="#444">+ getFeedSchedule()</text>

  <!-- KEDİGİLLER -->
  <rect x="245" y="330" width="170" height="86" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="1"/>
  <line x1="245" y1="352" x2="415" y2="352" stroke="#555" stroke-width="1"/>
  <line x1="245" y1="368" x2="415" y2="368" stroke="#555" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="bold" x="330" y="344" text-anchor="middle" dominant-baseline="central" fill="#222">Kedigiller</text>
  <text font-family="Arial, sans-serif" font-size="11" x="255" y="380" dominant-baseline="central" fill="#444">+ getDosage()</text>
  <text font-family="Arial, sans-serif" font-size="11" x="255" y="398" dominant-baseline="central" fill="#444">+ getFeedSchedule()</text>

  <!-- KEMİRGENLER -->
  <rect x="460" y="330" width="170" height="86" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="1"/>
  <line x1="460" y1="352" x2="630" y2="352" stroke="#555" stroke-width="1"/>
  <line x1="460" y1="368" x2="630" y2="368" stroke="#555" stroke-width="0.5"/>
  <text font-family="Arial, sans-serif" font-size="14" font-weight="bold" x="545" y="344" text-anchor="middle" dominant-baseline="central" fill="#222">Kemirgenler</text>
  <text font-family="Arial, sans-serif" font-size="11" x="470" y="380" dominant-baseline="central" fill="#444">+ getDosage()</text>
  <text font-family="Arial, sans-serif" font-size="11" x="470" y="398" dominant-baseline="central" fill="#444">+ getFeedSchedule()</text>

  <!-- KALITIM OKLARI -->
  <line x1="115" y1="330" x2="115" y2="290" stroke="#555" stroke-width="1"/>
  <line x1="330" y1="330" x2="330" y2="290" stroke="#555" stroke-width="1"/>
  <line x1="545" y1="330" x2="545" y2="290" stroke="#555" stroke-width="1"/>
  <line x1="115" y1="290" x2="545" y2="290" stroke="#555" stroke-width="1"/>
  <line x1="330" y1="290" x2="330" y2="172" stroke="#555" stroke-width="1" marker-end="url(#open-arrow)"/>

  <!-- Alt türler: Atlar -->
  <rect x="20" y="500" width="80" height="36" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="0.8"/>
  <line x1="20" y1="514" x2="100" y2="514" stroke="#555" stroke-width="0.8"/>
  <text font-family="Arial, sans-serif" font-size="11" x="60" y="508" text-anchor="middle" dominant-baseline="central" fill="#444">At</text>

  <rect x="108" y="500" width="80" height="36" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="0.8"/>
  <line x1="108" y1="514" x2="188" y2="514" stroke="#555" stroke-width="0.8"/>
  <text font-family="Arial, sans-serif" font-size="11" x="148" y="508" text-anchor="middle" dominant-baseline="central" fill="#444">Zebra</text>

  <line x1="60" y1="500" x2="60" y2="470" stroke="#555" stroke-width="0.8"/>
  <line x1="148" y1="500" x2="148" y2="470" stroke="#555" stroke-width="0.8"/>
  <line x1="60" y1="470" x2="148" y2="470" stroke="#555" stroke-width="0.8"/>
  <line x1="104" y1="470" x2="104" y2="416" stroke="#555" stroke-width="0.8" marker-end="url(#open-arrow)"/>

  <!-- Alt türler: Kedigiller -->
  <rect x="240" y="500" width="80" height="36" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="0.8"/>
  <line x1="240" y1="514" x2="320" y2="514" stroke="#555" stroke-width="0.8"/>
  <text font-family="Arial, sans-serif" font-size="11" x="280" y="508" text-anchor="middle" dominant-baseline="central" fill="#444">Kaplan</text>

  <rect x="328" y="500" width="80" height="36" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="0.8"/>
  <line x1="328" y1="514" x2="408" y2="514" stroke="#555" stroke-width="0.8"/>
  <text font-family="Arial, sans-serif" font-size="11" x="368" y="508" text-anchor="middle" dominant-baseline="central" fill="#444">Aslan</text>

  <line x1="280" y1="500" x2="280" y2="470" stroke="#555" stroke-width="0.8"/>
  <line x1="368" y1="500" x2="368" y2="470" stroke="#555" stroke-width="0.8"/>
  <line x1="280" y1="470" x2="368" y2="470" stroke="#555" stroke-width="0.8"/>
  <line x1="324" y1="470" x2="324" y2="416" stroke="#555" stroke-width="0.8" marker-end="url(#open-arrow)"/>

  <!-- Alt türler: Kemirgenler -->
  <rect x="455" y="500" width="80" height="36" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="0.8"/>
  <line x1="455" y1="514" x2="535" y2="514" stroke="#555" stroke-width="0.8"/>
  <text font-family="Arial, sans-serif" font-size="11" x="495" y="508" text-anchor="middle" dominant-baseline="central" fill="#444">Sıçan</text>

  <rect x="543" y="500" width="80" height="36" rx="4" fill="#f5f5f0" stroke="#555" stroke-width="0.8"/>
  <line x1="543" y1="514" x2="623" y2="514" stroke="#555" stroke-width="0.8"/>
  <text font-family="Arial, sans-serif" font-size="11" x="583" y="508" text-anchor="middle" dominant-baseline="central" fill="#444">Kunduz</text>

  <line x1="495" y1="500" x2="495" y2="470" stroke="#555" stroke-width="0.8"/>
  <line x1="583" y1="500" x2="583" y2="470" stroke="#555" stroke-width="0.8"/>
  <line x1="495" y1="470" x2="583" y2="470" stroke="#555" stroke-width="0.8"/>
  <line x1="539" y1="470" x2="539" y2="416" stroke="#555" stroke-width="0.8" marker-end="url(#open-arrow)"/>
</svg>
